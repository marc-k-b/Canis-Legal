<!DOCTYPE html>
<html lang="de">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:#f8fafc;
color:#1c1c1c;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* language switch */

.lang-switch{
position:fixed;
top:20px;
right:20px;
background:white;
padding:8px 12px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.lang-switch button{
border:none;
background:none;
font-weight:600;
cursor:pointer;
margin:0 4px;
}

/* hero */

.hero{
background:linear-gradient(135deg,#01998D,#016e66);
color:white;
padding:120px 20px;
}

.hero-inner{
display:flex;
align-items:center;
justify-content:space-between;
gap:60px;
max-width:1200px;
margin:auto;
}

.hero h1{
font-size:52px;
line-height:1.1;
margin-bottom:20px;
}

.hero p{
font-size:20px;
opacity:0.9;
}

.cta{
margin-top:30px;
display:flex;
gap:15px;
}

.button{
background:white;
color:#01998D;
padding:14px 26px;
border-radius:12px;
font-weight:600;
text-decoration:none;
}

.phone{
width:280px;
border-radius:40px;
background:black;
padding:10px;
box-shadow:0 30px 60px rgba(0,0,0,0.3);
}

.phone img{
width:100%;
border-radius:30px;
}

/* features */

.features{
padding:100px 20px;
}

.feature-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:60px;
}

.feature{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.feature h3{
margin-bottom:10px;
}

/* screenshots */

.screens{
padding:100px 20px;
text-align:center;
}

.screenshot-row{
margin-top:60px;
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.screenshot{
width:230px;
border-radius:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* download */

.download{
background:#01998D;
color:white;
text-align:center;
padding:100px 20px;
}

.store-buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
}

.store-buttons img{
height:55px;
}

/* footer */

.footer{
text-align:center;
padding:40px;
font-size:14px;
color:#777;
}

</style>

<div class="lang-switch">

<button onclick="setLang('en')">EN</button>
</div>

</p>

<div class="cta">

<a class="button"

App laden

<img src="screenshot1.png">

<div class="feature">

<h3 data-de="🐕 Individuelle Analyse"

</div>

<script>

function setLang(lang){

document.querySelectorAll("[data-de]").forEach(el=>{

el.innerText = el.getAttribute("data-"+lang)
